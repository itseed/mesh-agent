<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="capGrad" x1="100" y1="20" x2="100" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F0EAE0"/>
      <stop offset="100%" stop-color="#D4C8B0"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Stem drawn first so cap naturally overlaps its top -->
  <rect x="82" y="104" width="36" height="38" rx="6" fill="#A07840"/>

  <!-- Mushroom cap — dominant dome, 180px wide, gradient warm off-white -->
  <path d="M 10,90 C 10,5 190,5 190,90 Q 148,108 100,108 Q 52,108 10,90 Z"
        fill="url(#capGrad)"/>

  <!-- Eyes on cap — horizontal ellipses, calm and focused -->
  <ellipse cx="80"  cy="76" rx="11" ry="8" fill="#1A1A2E"/>
  <ellipse cx="120" cy="76" rx="11" ry="8" fill="#1A1A2E"/>

  <!-- Mycelium threads — symmetric 5-branch fan from stem base -->
  <path d="M 100,142 Q 100,168 100,192"     fill="none" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <path d="M 93,142  Q 76,165 65,186"       fill="none" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <path d="M 87,140  Q 58,160 36,176"       fill="none" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <path d="M 107,142 Q 124,165 135,186"     fill="none" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <path d="M 113,140 Q 142,160 164,176"     fill="none" stroke="#3fb950" stroke-width="1" opacity="0.6"/>

  <!-- Agent node endpoints — glowing, palette colors -->
  <circle cx="100" cy="192" r="3.5" fill="#d2a8ff" filter="url(#glow)"/>
  <circle cx="65"  cy="186" r="3.5" fill="#3fb950"  filter="url(#glow)"/>
  <circle cx="36"  cy="176" r="3.5" fill="#58a6ff"  filter="url(#glow)"/>
  <circle cx="135" cy="186" r="3.5" fill="#f0883e"  filter="url(#glow)"/>
  <circle cx="164" cy="176" r="3.5" fill="#4DFFB4"  filter="url(#glow)"/>
</svg>
