<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Mushroom cap (cream dome, ~130px wide, ~76px tall) -->
  <ellipse cx="100" cy="62" rx="65" ry="38" fill="#F5F0E8"/>

  <!-- Cap highlight (subtle sheen) -->
  <ellipse cx="88" cy="50" rx="28" ry="14" fill="white" opacity="0.22"/>

  <!-- Cap spots (brown) -->
  <circle cx="84" cy="50" r="8"   fill="#A08060" opacity="0.60"/>
  <circle cx="118" cy="46" r="6"  fill="#A08060" opacity="0.60"/>
  <circle cx="130" cy="66" r="7"  fill="#A08060" opacity="0.55"/>
  <circle cx="71"  cy="68" r="5"  fill="#A08060" opacity="0.55"/>

  <!-- Stem (~40px wide, ~50px tall, earthy) -->
  <rect x="80" y="97" width="40" height="50" rx="8" fill="#C4956A"/>

  <!-- Face — just below cap rim -->
  <!-- Left eye -->
  <circle cx="88"  cy="116" r="9" fill="white"/>
  <circle cx="88"  cy="116" r="5" fill="#0d1117"/>
  <!-- Right eye -->
  <circle cx="112" cy="116" r="9" fill="white"/>
  <circle cx="112" cy="116" r="5" fill="#0d1117"/>
  <!-- Smile arc -->
  <path d="M86,128 Q100,139 114,128" fill="none" stroke="#0d1117" stroke-width="2" stroke-linecap="round"/>

  <!-- Mycelium threads from stem base (5 quadratic bezier curves) -->
  <path d="M 90,147 Q 64,163 38,180"  fill="none" stroke="#4DFFB4" stroke-width="1.5" opacity="0.7"/>
  <path d="M 85,144 Q 50,150 22,163"  fill="none" stroke="#4DFFB4" stroke-width="1.5" opacity="0.7"/>
  <path d="M 100,147 Q 100,178 100,210" fill="none" stroke="#4DFFB4" stroke-width="1.5" opacity="0.7"/>
  <path d="M 115,144 Q 150,150 178,163" fill="none" stroke="#4DFFB4" stroke-width="1.5" opacity="0.7"/>
  <path d="M 110,147 Q 136,163 162,180" fill="none" stroke="#4DFFB4" stroke-width="1.5" opacity="0.7"/>

  <!-- Agent node dots (glowing endpoints) -->
  <circle cx="38"  cy="180" r="4" fill="#58a6ff" filter="url(#glow)"/>
  <circle cx="22"  cy="163" r="4" fill="#3fb950" filter="url(#glow)"/>
  <circle cx="100" cy="210" r="4" fill="#d2a8ff" filter="url(#glow)"/>
  <circle cx="178" cy="163" r="4" fill="#f0883e" filter="url(#glow)"/>
  <circle cx="162" cy="180" r="4" fill="#4DFFB4" filter="url(#glow)"/>
</svg>
