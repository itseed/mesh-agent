services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-meshagent}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'allkeys-lru',
        '--appendonly',
        'yes',
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384m

  # Run repo cleanup manually: docker exec <orchestrator> bash /app/scripts/cleanup-repos.sh
  # Or add to crontab: 0 3 * * 0 docker exec meshagent-orchestrator bash /app/scripts/cleanup-repos.sh
  orchestrator:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-meshagent}
      PORT: 4802
      CLAUDE_CMD: ${CLAUDE_CMD:-claude}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      MAX_CONCURRENT_SESSIONS: ${MAX_CONCURRENT_SESSIONS:-16}
      SESSION_IDLE_TIMEOUT_MS: ${SESSION_IDLE_TIMEOUT_MS:-3600000}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
      API_URL: http://api:4801
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
    volumes:
      - claude_config:/root/.claude
      - gemini_config:/root/.gemini
      - cursor_config:/root/.cursor
    deploy:
      resources:
        limits:
          memory: 2g
        reservations:
          memory: 256m

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME:-meshagent}
      DB_POOL_MAX: ${DB_POOL_MAX:-20}
      DB_POOL_IDLE_TIMEOUT: ${DB_POOL_IDLE_TIMEOUT:-30}
      REDIS_URL: redis://redis:6379
      AUTH_EMAIL: ${AUTH_EMAIL}
      AUTH_PASSWORD: ${AUTH_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      TOKEN_ENCRYPTION_KEY: ${TOKEN_ENCRYPTION_KEY}
      ORCHESTRATOR_URL: http://orchestrator:4802
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      GITHUB_OAUTH_CLIENT_ID: ${GITHUB_OAUTH_CLIENT_ID}
      GITHUB_OAUTH_CLIENT_SECRET: ${GITHUB_OAUTH_CLIENT_SECRET}
      GITHUB_OAUTH_REDIRECT_URI: ${GITHUB_OAUTH_REDIRECT_URI}
      WEB_BASE_URL: ${WEB_BASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      RATE_LIMIT_WINDOW: ${RATE_LIMIT_WINDOW:-1 minute}
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-10}
      AUTH_RATE_LIMIT_WINDOW: ${AUTH_RATE_LIMIT_WINDOW:-1 minute}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_USE_SSL: 'false'
      MINIO_BUCKET: ${MINIO_BUCKET:-mesh-agent}
      PORT: 4801
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      orchestrator:
        condition: service_started
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1g
        reservations:
          memory: 256m

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://${DOMAIN}/api
        NEXT_PUBLIC_WS_URL: wss://${DOMAIN}/api
    restart: unless-stopped
    environment:
      NODE_ENV: production
    depends_on:
      - api
    deploy:
      resources:
        limits:
          memory: 512m

  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/meshagent.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - web
      - api

  certbot:
    image: certbot/certbot
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do certbot renew --webroot -w /var/www/certbot --quiet;
             sleep 12h & wait $${!}; done"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512m

volumes:
  db_data:
  redis_data:
  certbot_certs:
  certbot_www:
  claude_config:
  minio_data:
  gemini_config:
  cursor_config:
