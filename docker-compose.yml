services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meshagent
      POSTGRES_PASSWORD: meshagent
      POSTGRES_DB: meshagent
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meshagent"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  orchestrator:
    build:
      context: .
      dockerfile: packages/orchestrator/Dockerfile.dev
    environment:
      REDIS_URL: redis://redis:6379
      PORT: 3002
      CLAUDE_CMD: claude
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    volumes:
      - ./packages/orchestrator:/app/packages/orchestrator
      - ./packages/shared:/app/packages/shared
      - ~/.claude:/root/.claude:ro
    ports:
      - "3002:3002"
    depends_on:
      redis:
        condition: service_healthy

volumes:
  db_data:
  redis_data:
